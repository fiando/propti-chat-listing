AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Propti Real Estate Platform Backend
Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
    - arm64
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        DYNAMODB_LISTINGS_TABLE:
          Ref: ListingsTable
        DYNAMODB_USERS_TABLE:
          Ref: UsersTable
        DYNAMODB_TRANSACTIONS_TABLE:
          Ref: TransactionsTable
        DYNAMODB_MODERATIONS_TABLE:
          Ref: ModerationsTable
        DYNAMODB_LEADS_TABLE:
          Ref: LeadsTable
        DYNAMODB_UPLOAD_SESSIONS_TABLE:
          Ref: UploadSessionsTable
        DYNAMODB_WHATSAPP_SESSIONS_TABLE:
          Ref: WhatsAppSessionsTable
        DYNAMODB_WHATSAPP_OTP_TABLE:
          Ref: WhatsAppOTPTable
        WHATSAPP_PROVIDER:
          Ref: WhatsAppProvider
        S3_MEDIA_BUCKET:
          Ref: MediaBucket
        JWT_SECRET:
          Ref: JWTSecret
        OPENAI_API_KEY:
          Ref: OpenAIAPIKey
        GOOGLE_MAPS_API_KEY:
          Ref: GoogleMapsAPIKey
        DOKU_CLIENT_ID:
          Ref: DOKUClientID
        DOKU_SECRET_KEY:
          Ref: DOKUSecretKey
        TWILIO_ACCOUNT_SID:
          Ref: TwilioAccountSID
        TWILIO_AUTH_TOKEN:
          Ref: TwilioAuthToken
        TWILIO_WHATSAPP_FROM:
          Ref: TwilioWhatsAppFrom
        WHATSAPP_MESSAGE_TARGET:
          Ref: WhatsAppMessageTarget
        TWILIO_VERIFY_SERVICE_SID:
          Ref: TwilioVerifyServiceSID
        META_WHATSAPP_ACCESS_TOKEN: ''
        META_WHATSAPP_PHONE_NUMBER_ID: ''
        META_WHATSAPP_VERIFY_TOKEN: ''
        META_WHATSAPP_APP_SECRET: ''
        META_WHATSAPP_API_VERSION: v23.0
        META_WHATSAPP_API_BASE_URL: https://graph.facebook.com
        DOKU_ENV:
          Fn::FindInMap:
          - StageToDOKUEnv
          - Ref: Stage
          - env
        PUBLIC_API_BASE_URL:
          Fn::If:
          - HasApiCustomDomain
          - Fn::Sub: https://${ApiCustomDomainName}
          - Fn::Sub: https://${ProptiApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
        LOG_LEVEL: info
  Api:
    Cors:
      AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
      AllowHeaders: '''Content-Type,Authorization'''
      AllowOrigin: '''*'''
Mappings:
  StageToDOKUEnv:
    dev:
      env: sandbox
    staging:
      env: sandbox
    production:
      env: production
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - staging
    - production
  ApiCustomDomainName:
    Type: String
    Default: ''
  ApiCustomDomainCertificateArn:
    Type: String
    Default: ''
  JWTSecret:
    Type: String
    NoEcho: true
  OpenAIAPIKey:
    Type: String
    NoEcho: true
  GoogleMapsAPIKey:
    Type: String
    NoEcho: true
  DOKUClientID:
    Type: String
    NoEcho: true
  DOKUSecretKey:
    Type: String
    NoEcho: true
  WhatsAppProvider:
    Type: String
    Default: twilio
    AllowedValues:
    - twilio
    - meta
  TwilioAccountSID:
    Type: String
    Default: ''
    NoEcho: true
  TwilioAuthToken:
    Type: String
    Default: ''
    NoEcho: true
  TwilioWhatsAppFrom:
    Type: String
    Default: ''
  WhatsAppMessageTarget:
    Type: String
    Default: ''
  TwilioVerifyServiceSID:
    Type: String
    Default: ''
Conditions:
  HasApiCustomDomain:
    Fn::And:
    - Fn::Not:
      - Fn::Equals:
        - Ref: ApiCustomDomainName
        - ''
    - Fn::Not:
      - Fn::Equals:
        - Ref: ApiCustomDomainCertificateArn
        - ''
Resources:
  ProptiApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName:
        Ref: Stage
      Cors:
        AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowOrigin: '''*'''
  AuthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
      SamResourceId: AuthFunction
    Properties:
      FunctionName:
        Fn::Sub: propti-auth-${Stage}
      CodeUri: AuthFunction
      Handler: bootstrap
      Description: Handles Google OAuth login and user profile management
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Events:
        GoogleLogin:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /auth/google
            Method: POST
        GetUser:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /auth/user
            Method: GET
        UpdateUser:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /auth/user
            Method: PUT
        AuthOptions:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /auth/{proxy+}
            Method: OPTIONS
        WhatsAppLinkStatus:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /auth/whatsapp/link-status
            Method: GET
        WhatsAppLinkChallenge:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /auth/whatsapp/link-challenge
            Method: POST
        WhatsAppLinkVerify:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /auth/whatsapp/link-verify
            Method: POST
        WhatsAppLinkDisconnect:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /auth/whatsapp/link
            Method: DELETE
  ListingsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
      SamResourceId: ListingsFunction
    Properties:
      FunctionName:
        Fn::Sub: propti-listings-${Stage}
      CodeUri: ListingsFunction
      Handler: bootstrap
      Description: Handles listing CRUD, search, text parsing, and media uploads
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Environment:
        Variables:
          LISTINGS_FUNCTION_NAME:
            Fn::Sub: propti-listings-${Stage}
      Events:
        CreateListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings
            Method: POST
        PrepareUpload:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/upload-prepare
            Method: POST
        ListListings:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings
            Method: GET
        GetListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/{id}
            Method: GET
        RecordListingView:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/{id}/view
            Method: POST
        RevealListingContact:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/{id}/contact-reveal
            Method: POST
        UpdateListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/{id}
            Method: PUT
        DeleteListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/{id}
            Method: DELETE
        ParseText:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/parse-text
            Method: POST
        CreateLead:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /leads
            Method: POST
        ListLeads:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /leads
            Method: GET
        GetLead:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /leads/{id}
            Method: GET
        UpdateLeadStage:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /leads/{id}/stage
            Method: POST
        AddLeadNote:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /leads/{id}/notes
            Method: POST
        CompleteLeadFollowUp:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /leads/{id}/followups/{taskId}/complete
            Method: POST
        LeadAnalytics:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /leads/analytics
            Method: GET
        UploadURL:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/{id}/upload-url
            Method: POST
        RootHealth:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /
            Method: GET
        MyListings:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /users/me/listings
            Method: GET
        GetMyListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /users/me/listings/{id}
            Method: GET
        RelistMyListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /users/me/listings/{id}/relist
            Method: POST
        SavedListings:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /users/me/saved
            Method: GET
        SaveListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/{id}/save
            Method: POST
        UnsaveListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /listings/{id}/save
            Method: DELETE
        SearchNearby:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /search/nearby
            Method: GET
        SearchParseIntent:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /search/parse-intent
            Method: POST
        LocationSuggestions:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /locations/suggestions
            Method: GET
        LocationProvinces:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /locations/provinces
            Method: GET
        LocationCities:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /locations/cities
            Method: GET
        LocationDistricts:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /locations/districts
            Method: GET
  AIFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
      SamResourceId: AIFunction
    Properties:
      FunctionName:
        Fn::Sub: propti-payment-${Stage}
      CodeUri: AIFunction
      Handler: bootstrap
      Description: Handles premium subscriptions and featured listings via DOKU
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Events:
        PremiumUpgrade:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /premium/upgrade
            Method: POST
        FeatureListing:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /premium/feature-listing
            Method: POST
        PaymentCallback:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /premium/callback
            Method: POST
        PremiumOptions:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /premium/{proxy+}
            Method: OPTIONS
  WhatsAppFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
      SamResourceId: WhatsAppFunction
    Properties:
      FunctionName:
        Fn::Sub: propti-whatsapp-${Stage}
      CodeUri: WhatsAppFunction
      Handler: bootstrap
      Description: Handles WhatsApp inbound messages, status callbacks, and provider
        verification handshakes
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Environment:
        Variables:
          LISTINGS_FUNCTION_NAME:
            Fn::Sub: propti-listings-${Stage}
      Events:
        WhatsAppWebhookVerify:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /whatsapp/webhook
            Method: GET
        WhatsAppWebhookUnified:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /whatsapp/webhook
            Method: POST
        WhatsAppWebhookInbound:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /whatsapp/webhook/inbound
            Method: POST
        WhatsAppWebhookStatus:
          Type: Api
          Properties:
            RestApiId:
              Ref: ProptiApi
            Path: /whatsapp/webhook/status
            Method: POST
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: propti-lambda-role-${Stage}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: ProptiDynamoDBPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            Resource:
            - Fn::GetAtt:
              - ListingsTable
              - Arn
            - Fn::Sub: ${ListingsTable.Arn}/index/*
            - Fn::GetAtt:
              - UsersTable
              - Arn
            - Fn::Sub: ${UsersTable.Arn}/index/*
            - Fn::GetAtt:
              - TransactionsTable
              - Arn
            - Fn::Sub: ${TransactionsTable.Arn}/index/*
            - Fn::GetAtt:
              - ModerationsTable
              - Arn
            - Fn::Sub: ${ModerationsTable.Arn}/index/*
            - Fn::GetAtt:
              - LeadsTable
              - Arn
            - Fn::Sub: ${LeadsTable.Arn}/index/*
            - Fn::GetAtt:
              - UploadSessionsTable
              - Arn
            - Fn::GetAtt:
              - WhatsAppSessionsTable
              - Arn
            - Fn::GetAtt:
              - WhatsAppOTPTable
              - Arn
      - PolicyName: ProptiS3Policy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
            Resource:
            - Fn::GetAtt:
              - MediaBucket
              - Arn
            - Fn::Sub: ${MediaBucket.Arn}/*
      - PolicyName: ProptiModerationWorkerPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:InvokeFunction
            Resource:
            - Fn::Sub: arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:propti-listings-${Stage}
  ListingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: propti-listings-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: listingId
        AttributeType: S
      - AttributeName: userId
        AttributeType: S
      - AttributeName: createdAt
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: listingId-index
        KeySchema:
        - AttributeName: listingId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      - IndexName: userId-createdAt-index
        KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: propti-users-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: googleId
        AttributeType: S
      - AttributeName: whatsAppLinkedPhone
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: googleId-index
        KeySchema:
        - AttributeName: googleId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      - IndexName: whatsAppLinkedPhone-index
        KeySchema:
        - AttributeName: whatsAppLinkedPhone
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName:
        Fn::Sub: propti-transactions-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: userId
        AttributeType: S
      - AttributeName: orderId
        AttributeType: S
      - AttributeName: createdAt
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: userId-createdAt-index
        KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: orderId-index
        KeySchema:
        - AttributeName: orderId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  ModerationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: propti-moderations-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: listingId
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: listingId-index
        KeySchema:
        - AttributeName: listingId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  LeadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: propti-leads-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: ownerUserId
        AttributeType: S
      - AttributeName: createdAt
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: ownerUserId-createdAt-index
        KeySchema:
        - AttributeName: ownerUserId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  UploadSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: propti-upload-sessions-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: sessionId
        AttributeType: S
      KeySchema:
      - AttributeName: sessionId
        KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  WhatsAppSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: propti-whatsapp-sessions-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: sessionId
        AttributeType: S
      KeySchema:
      - AttributeName: sessionId
        KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  WhatsAppOTPTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: propti-whatsapp-otp-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: otpId
        AttributeType: S
      KeySchema:
      - AttributeName: otpId
        KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: propti-media-${Stage}-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders:
          - '*'
          AllowedMethods:
          - GET
          - PUT
          - POST
          - DELETE
          - HEAD
          AllowedOrigins:
          - '*'
          ExposedHeaders:
          - ETag
          MaxAge: 3600
      LifecycleConfiguration:
        Rules:
        - Id: DeleteIncompleteMultipartUploads
          Status: Enabled
          AbortIncompleteMultipartUpload:
            DaysAfterInitiation: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: HasApiCustomDomain
    Properties:
      DomainName:
        Ref: ApiCustomDomainName
      EndpointConfiguration:
        Types:
        - REGIONAL
      RegionalCertificateArn:
        Ref: ApiCustomDomainCertificateArn
      SecurityPolicy: TLS_1_2
  ApiCustomDomainMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasApiCustomDomain
    Properties:
      DomainName:
        Ref: ApiCustomDomain
      RestApiId:
        Ref: ProptiApi
      Stage:
        Ref: Stage
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${ProptiApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
    Export:
      Name:
        Fn::Sub: ProptiApiUrl-${Stage}
  ListingsTableName:
    Description: DynamoDB listings table name
    Value:
      Ref: ListingsTable
  UsersTableName:
    Description: DynamoDB users table name
    Value:
      Ref: UsersTable
  TransactionsTableName:
    Description: DynamoDB transactions table name
    Value:
      Ref: TransactionsTable
  ModerationsTableName:
    Description: DynamoDB moderations table name
    Value:
      Ref: ModerationsTable
  LeadsTableName:
    Description: DynamoDB leads table name
    Value:
      Ref: LeadsTable
  UploadSessionsTableName:
    Description: DynamoDB upload session table name
    Value:
      Ref: UploadSessionsTable
  WhatsAppSessionsTableName:
    Description: DynamoDB WhatsApp session table name
    Value:
      Ref: WhatsAppSessionsTable
  WhatsAppOTPTableName:
    Description: DynamoDB WhatsApp OTP table name
    Value:
      Ref: WhatsAppOTPTable
  MediaBucketName:
    Description: S3 media bucket name
    Value:
      Ref: MediaBucket
  ApiCustomDomainUrl:
    Condition: HasApiCustomDomain
    Description: Custom domain URL for the API
    Value:
      Fn::Sub: https://${ApiCustomDomainName}
  ApiCustomDomainRegionalName:
    Condition: HasApiCustomDomain
    Description: Regional API Gateway domain target for DNS
    Value:
      Fn::GetAtt:
      - ApiCustomDomain
      - RegionalDomainName
  ApiCustomDomainHostedZoneId:
    Condition: HasApiCustomDomain
    Description: Hosted zone ID for API Gateway regional custom domain alias
    Value:
      Fn::GetAtt:
      - ApiCustomDomain
      - RegionalHostedZoneId
